name: Release

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    outputs:
      new_release: ${{ steps.release.outputs.new_release_published }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  native-build:
    needs: release
    if: >-
      needs.release.outputs.new_release == 'true' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: qorche-linux-amd64
            binary: cli/build/native/nativeCompile/qorche
          - os: windows-latest
            artifact: qorche-windows-amd64.exe
            binary: cli/build/native/nativeCompile/qorche.exe
          - os: macos-latest
            artifact: qorche-macos-arm64
            binary: cli/build/native/nativeCompile/qorche

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 21
          distribution: graalvm-community

      - uses: gradle/actions/setup-gradle@v4

      - name: Build native image
        run: ./gradlew :cli:nativeCompile

      - name: Compress with UPX
        if: matrix.os == 'ubuntu-latest'
        uses: svenstaro/upx-action@v2
        with:
          files: ${{ matrix.binary }}
          args: --best --lzma

      - name: Verify binary runs
        shell: bash
        run: |
          "${{ matrix.binary }}" version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

      - name: Attach to latest release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          cp "${{ matrix.binary }}" "${{ matrix.artifact }}"
          gh release upload "$TAG" "${{ matrix.artifact }}" --clobber
